id: io.ente.photos
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: run.sh
rename-desktop-file: ente.desktop
rename-icon: ente

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --share=network
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.kde.kwalletd5
  - --talk-name=org.kde.kwalletd6

modules:
  - name: ente
    buildsystem: simple
    build-commands:
      - ar x ente.deb
      - tar xf data.tar.xz
      - mv opt/ente /app
      - mv usr/share/applications usr/share/icons /app/share
      - rm -rf /app/share/icons/hicolor/1024x1024
      - desktop-file-edit --set-key Exec --set-value "run.sh %U" /app/share/applications/ente.desktop
      - mkdir /app/share/appdata
      - mv /app/ente/resources/$FLATPAK_ID.appdata.xml /app/share/appdata
      - sed -i -E 's#(<release version="1\.7(\.[0-9]+)?" date=")[0-9]{4}-[0-9]{2}-[0-9]{2}(">.*)#\1'"$(date
        +%F)"'\3#' /app/share/appdata/$FLATPAK_ID.appdata.xml
      - install -Dm755 -t /app/bin run.sh
    sources:
      - type: file
        only-arches: [x86_64]
        url: https://github.com/ente-io/photos-desktop/releases/download/v1.7.25/ente-1.7.25-amd64.deb
        sha256: e78fa9349e945c9f89a73a6c09c1bcd9f3558d9c1214980c6ac161521e995821
        dest-filename: ente.deb
        x-checker-data:
          type: json
          url: https://api.github.com/repos/ente-io/photos-desktop/releases/latest
          version-query: .tag_name | sub("v"; "")
          url-query: '"https://github.com/ente-io/photos-desktop/releases/download/v"
            + $version + "/ente-" + $version + "-amd64.deb"'
      - type: file
        only-arches: [aarch64]
        url: https://github.com/ente-io/photos-desktop/releases/download/v1.7.25/ente-1.7.25-arm64.deb
        sha256: c0170c5168074f9873b2e0fa525736601bca7c6c4bcc7bbbe601eddbfa6095d8
        dest-filename: ente.deb
        x-checker-data:
          type: json
          url: https://api.github.com/repos/ente-io/photos-desktop/releases/latest
          version-query: .tag_name | sub("v"; "")
          url-query: '"https://github.com/ente-io/photos-desktop/releases/download/v"
            + $version + "/ente-" + $version + "-arm64.deb"'
      - type: script
        dest-filename: run.sh
        commands:
          - set -o errexit
          - TMPDIR="${XDG_RUNTIME_DIR}/app/${FLATPAK_ID}"
          - export TMPDIR
          - exec zypak-wrapper.sh /app/ente/ente "$@"
